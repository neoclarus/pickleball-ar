<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball AR 球場</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: #0a0a0a;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 32px 24px; text-align: center; gap: 24px;
}
h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
p { font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.7; max-width: 300px; }
ul {
  list-style: none; font-size: 14px; color: rgba(255,255,255,0.5);
  line-height: 2.2; text-align: left;
}
ul li::before { content: "· "; }

#ar-link {
  display: inline-block;
  background: #fff; color: #000;
  padding: 16px 48px; border-radius: 50px;
  font-size: 18px; font-weight: 600;
  text-decoration: none; margin-top: 8px;
}
#ar-link:active { opacity: 0.8; }

.note {
  font-size: 13px; color: rgba(255,255,255,0.35);
  max-width: 280px; line-height: 1.6;
}

.divider {
  width: 40px; height: 1px;
  background: rgba(255,255,255,0.1);
}
</style>
</head>
<body>

<h1>🏓 Pickleball AR</h1>

<p>用 iPhone Safari 在地面投影 1:1 真實比例的匹克球場線條</p>

<ul>
  <li>標準場地 20 × 44 英尺（6.1 × 13.4 公尺）</li>
  <li>含廚房線、中線、發球區、球網位置</li>
  <li>放置後可自由移動、旋轉、縮放</li>
</ul>

<a id="ar-link" href="court.usdz" rel="ar">
  開啟 AR 球場
</a>

<div class="divider"></div>

<p class="note">
  點擊後會自動開啟 Apple AR Quick Look<br>
  對準地面，點擊放置球場<br><br>
  僅支援 iPhone（iOS 12 以上）/ iPad
</p>

</body>
</html>
