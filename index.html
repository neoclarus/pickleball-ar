<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball AR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: #0a0a0a; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 40px 24px; gap: 24px; text-align: center;
}

h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }

.card {
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.12);
  border-radius: 16px; padding: 18px 20px;
  width: 100%; max-width: 340px; text-align: left;
}
.card-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 12px;
}
.row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; font-size: 14px;
  border-bottom: 0.5px solid rgba(255,255,255,0.07);
}
.row:last-child { border-bottom: none; }
.row-label { color: rgba(255,255,255,0.5); }
.row-val { color: #fff; font-weight: 500; }

#ar-btn {
  display: block; width: 100%; max-width: 340px;
  background: #fff; color: #000; border: none;
  padding: 16px 0; border-radius: 50px; font-size: 18px; font-weight: 600;
  cursor: pointer; text-decoration: none; -webkit-tap-highlight-color: transparent;
}
#ar-btn:active { opacity: 0.8; }

.how {
  width: 100%; max-width: 340px;
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 18px 20px; text-align: left;
}
.how-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 14px;
}
.step {
  display: flex; gap: 12px; align-items: flex-start;
  margin-bottom: 12px; font-size: 14px; line-height: 1.5;
}
.step:last-child { margin-bottom: 0; }
.step-num {
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
  border-radius: 50%; width: 22px; height: 22px; min-width: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; margin-top: 1px;
}
.step-text { color: rgba(255,255,255,0.75); }
.step-text strong { color: #fff; }

.warn {
  width: 100%; max-width: 340px;
  background: rgba(255, 200, 0, 0.07);
  border: 0.5px solid rgba(255, 200, 0, 0.25);
  border-radius: 12px; padding: 12px 16px;
  font-size: 13px; color: rgba(255, 220, 80, 0.9); line-height: 1.7; text-align: left;
}

.note { font-size: 12px; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<h1>🏓 Pickleball AR</h1>

<div class="card">
  <div class="card-title">球場規格</div>
  <div class="row"><span class="row-label">整體尺寸</span><span class="row-val">20 × 44 英尺</span></div>
  <div class="row"><span class="row-label">廚房區（距網）</span><span class="row-val">各 7 英尺</span></div>
  <div class="row"><span class="row-label">發球區</span><span class="row-val">10 × 15 英尺 × 2</span></div>
  <div class="row"><span class="row-label">線條寬度</span><span class="row-val">2 英寸</span></div>
</div>

<a id="ar-btn" href="court.usdz" rel="ar">開啟 AR 球場</a>

<div class="warn">
  ⚠️ <strong>請勿雙指縮放</strong>，會改變真實比例<br>
  尺寸跑掉時：<strong>雙擊球場</strong> → 自動重置回 1:1 原始大小
</div>

<div class="how">
  <div class="how-title">操作說明</div>
  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">點「開啟 AR 球場」，允許相機權限</div>
  </div>
  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">慢慢對著<strong>地面</strong>移動 iPhone，等球場自動出現</div>
  </div>
  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text"><strong>單指拖曳</strong> → 移動球場位置</div>
  </div>
  <div class="step">
    <div class="step-num">4</div>
    <div class="step-text"><strong>雙指旋轉</strong>（順時針/逆時針）→ 轉動方向</div>
  </div>
  <div class="step">
    <div class="step-num">5</div>
    <div class="step-text"><strong>雙擊球場</strong> → 重置大小與位置</div>
  </div>
</div>

<p class="note">僅支援 iPhone / iPad · iOS 12 以上 · Safari</p>

</body>
</html>
